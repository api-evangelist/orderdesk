aid: orderdesk
url: https://raw.githubusercontent.com/api-evangelist/orderdesk/refs/heads/main/apis.yml
name: Order Desk
kind: company
description: Order Desk is an ecommerce order management and fulfillment routing platform
  that centralizes orders from shopping carts and marketplaces, then automates
  routing to print-on-demand, dropshipping, warehouse, and shipping providers via a
  rule builder and 300-plus integrations. Its public REST API (base
  https://app.orderdesk.me/api/v2, authenticated with store-id and api-key headers)
  exposes Orders, Order Items, Shipments, Inventory Items, and Store settings so
  developers can create and update orders, manage line items, record shipments and
  tracking, and sync inventory programmatically.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Ecommerce
- Order Management
- Fulfillment
- Dropshipping
- Inventory
- Shipping
created: '2026-07-11'
modified: '2026-07-11'
specificationVersion: '0.19'
