actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Order Desk's public API is
    request/response REST over HTTPS. No AsyncAPI document was created because
    there is no server-push transport on Order Desk's own API to model; outbound
    webhooks are dashboard-configured HTTP callbacks rather than a documented
    streaming API.
