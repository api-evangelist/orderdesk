meters:
- name: monthly_subscription
  description: Fixed monthly platform fee for the selected plan tier.
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: order_fee
  description: Per-order fee charged for each order created in the store during the billing period.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - store
  - source
principles:
- name: Visibility
  description: Track order counts per store and source so the variable per-order fee is attributable to the channels and integrations driving volume.
- name: Allocation
  description: Use child stores and order sources to map order fees to internal brands, clients, or cost centers.
- name: Optimization
  description: Match the plan tier to monthly order volume - the higher fixed fee on Pro or Plus pays off once volume makes the lower per-order rate cheaper than Starter's.
- name: Accountability
  description: Review monthly invoices (subscription plus previous-period order fees) against forecast order volume and re-evaluate the tier as volume grows.
