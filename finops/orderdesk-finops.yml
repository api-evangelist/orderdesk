description: >-
  FinOps view of Order Desk spend. Order Desk bills on two dimensions: a fixed
  monthly subscription fee tied to the plan tier (Starter, Pro, Plus) and a
  variable per-order fee charged for every order created in the store during the
  billing period. Higher tiers trade a larger fixed fee for a lower marginal
  per-order rate, so the cost-optimal plan depends on monthly order volume. The
  REST API does not carry a separate charge - programmatically created orders are
  billed identically to orders from any other source.
notes: >-
  Per-order fees range from USD 0.05 (Plus) to USD 0.25 (Starter). The dominant
  variable cost driver is order volume, so the break-even between tiers is a
  function of orders per month. Verify current rates on the Order Desk pricing
  page during reconciliation.
